<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .bg { fill: #0b0f1a; }
      .title { fill: #ffffff; font-family: Arial, Helvetica, sans-serif; font-size: 28px; font-weight: 700; }
      .subtitle { fill: #b7c0d8; font-family: Arial, Helvetica, sans-serif; font-size: 14px; }
      .hdr { fill: #ffffff; font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 700; }
      .box { fill: #131a2a; stroke: #2a3554; stroke-width: 2; rx: 10; }
      .team { fill: #ffffff; font-family: Arial, Helvetica, sans-serif; font-size: 15px; }
      .seed { fill: #b7c0d8; font-family: Arial, Helvetica, sans-serif; font-size: 13px; }
      .score { fill: #7fe7a5; font-family: Arial, Helvetica, sans-serif; font-size: 13px; font-weight: 700; }
      .line { stroke: #2a3554; stroke-width: 3; }
      .note { fill: #b7c0d8; font-family: Arial, Helvetica, sans-serif; font-size: 12px; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="900"/>

  <text class="title" x="700" y="48" text-anchor="middle">NFL Playoff Bracket (2025–26)</text>
